<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Journal</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827 54%, #12313b);
      color: #fff;
    }

    .card {
      width: min(430px, 100%);
      padding: 30px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.84);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
    }

    .logo {
      margin-bottom: 18px;
      color: #fff;
      font-size: 30px;
      font-weight: 800;
    }

    .logo span { color: #38bdf8; }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">Journal<span>.</span></div>
    <h1>Сайт временно недоступен</h1>
    <p>Journal не смог открыть сервер. Проверьте интернет, актуальность ссылки и запущен ли сайт. После восстановления соединения перезапустите приложение.</p>
  </main>
</body>
</html>
