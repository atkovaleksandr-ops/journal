<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Journal</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, system-ui, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(74, 222, 128, 0.16), transparent 30%),
        linear-gradient(145deg, #0f172a, #0b2f35);
    }

    .card {
      width: min(460px, 100%);
      padding: 28px;
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.24);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
    }

    .brand {
      margin: 0 0 18px;
      color: #5bd5ff;
      font-size: 34px;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 20px;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.55;
    }

    a {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="brand">Journal.</p>
    <h1>Открываем Journal</h1>
    <p>Приложение сразу подключается к опубликованному сайту. Если переход не начался автоматически, нажмите кнопку ниже.</p>
    <a id="openJournal" href="https://journal-production-858f.up.railway.app?journal_app=android">Открыть Journal</a>
  </main>

  <script>
    window.location.replace('https://journal-production-858f.up.railway.app?journal_app=android');
  </script>
</body>
</html>
