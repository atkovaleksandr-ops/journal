<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Journal</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, system-ui, sans-serif;
      color: #fff;
      background: linear-gradient(145deg, #0f172a, #0b2f35);
    }

    .card {
      width: min(460px, 100%);
      padding: 26px;
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.24);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
    }

    .brand {
      margin: 0 0 18px;
      color: #5bd5ff;
      font-size: 34px;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.55;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #e2e8f0;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 14px;
      color: #fff;
      background: rgba(2, 6, 23, 0.42);
      border: 1px solid rgba(148, 163, 184, 0.28);
      font: inherit;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      font: inherit;
      font-weight: 800;
    }

    .secondary {
      background: rgba(148, 163, 184, 0.18);
      border: 1px solid rgba(148, 163, 184, 0.22);
    }

    .hint {
      margin-top: 14px;
      margin-bottom: 0;
      color: #94a3b8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="brand">Journal.</p>
    <h1>Подключение к сайту</h1>
    <p>Укажите адрес сайта Journal, доступный с телефона. Для локальной сети это обычно адрес компьютера с Laragon.</p>

    <label for="journalUrl">Адрес сайта</label>
    <input id="journalUrl" type="url" inputmode="url" autocomplete="url" placeholder="https://journal.example.com">

    <div class="actions">
      <button id="openJournal" type="button">Открыть Journal</button>
      <button id="resetJournalUrl" type="button" class="secondary">Сбросить адрес</button>
    </div>

    <p class="hint">Адрес сохранится на этом устройстве. При смене домена просто обновите поле и откройте журнал снова.</p>
  </main>

  <script>
    const defaultUrl = 'http://journal.test';
    const storageKey = 'journal_site_url';
    const input = document.querySelector('#journalUrl');
    const openButton = document.querySelector('#openJournal');
    const resetButton = document.querySelector('#resetJournalUrl');

    input.value = localStorage.getItem(storageKey) || defaultUrl;

    function withAppMarker(rawUrl) {
      const url = new URL(rawUrl);
      url.searchParams.set('journal_app', 'android');
      return url.toString();
    }

    openButton.addEventListener('click', () => {
      const rawUrl = input.value.trim();

      try {
        const nextUrl = withAppMarker(rawUrl);
        localStorage.setItem(storageKey, rawUrl);
        window.location.href = nextUrl;
      } catch {
        input.focus();
      }
    });

    resetButton.addEventListener('click', () => {
      localStorage.removeItem(storageKey);
      input.value = defaultUrl;
      input.focus();
    });
  </script>
</body>
</html>
